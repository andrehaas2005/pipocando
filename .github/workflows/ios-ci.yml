name: iOS CI

on:
  pull_request:
    branches: [ main, master ]
  push:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 15.4
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Resolve Swift Packages
        run: xcodebuild -resolvePackageDependencies -project Pipocando.xcodeproj -scheme Pipocando

      - name: Build
        run: |
          xcodebuild \
            -project Pipocando.xcodeproj \
            -scheme Pipocando \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            -configuration Debug \
            -sdk iphonesimulator \
            build

      - name: Test
        run: |
          xcodebuild \
            -project Pipocando.xcodeproj \
            -scheme Pipocando \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            -configuration Debug \
            -sdk iphonesimulator \
            test
