name: iOS CI

on:
  pull_request:
    branches: [ main, master ]
  push:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16.2
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Resolve Swift Packages
        run: xcodebuild -resolvePackageDependencies -project Pipocando.xcodeproj -scheme Pipocando

      - name: Select available iOS Simulator destination
        run: |
          DESTINATION=$(xcrun simctl list devices available | awk -F '[()]' '/iPhone/ {print $2; exit}')
          if [ -z "$DESTINATION" ]; then
            echo "No available iPhone simulator found on runner."
            xcrun simctl list devices available
            exit 1
          fi
          echo "Using simulator: $DESTINATION"
          echo "IOS_DESTINATION=platform=iOS Simulator,id=$DESTINATION" >> "$GITHUB_ENV"

      - name: Build
        run: |
          xcodebuild \
            -project Pipocando.xcodeproj \
            -scheme Pipocando \
            -destination "$IOS_DESTINATION" \
            -configuration Debug \
            -sdk iphonesimulator \
            build

      - name: Test
        run: |
          xcodebuild \
            -project Pipocando.xcodeproj \
            -scheme Pipocando \
            -destination "$IOS_DESTINATION" \
            -configuration Debug \
            -sdk iphonesimulator \
            test
